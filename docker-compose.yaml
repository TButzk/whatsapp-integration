# =============================================================================
# docker-compose.yaml — Chatwoot Community Edition + Ollama Local
# Plataforma de atendimento via WhatsApp Business (Cloud API da Meta)
#
# Configuração para Windows com Docker Desktop + Ollama nativo no host:
#   - Chatwoot rodando em Docker (2 GB máximo)
#   - Ollama rodando nativo no Windows (fora do Docker)
#   - Integração via http://host.docker.internal:11434
#
# Distribuição de memória (máx 2 GB):
#   - PostgreSQL: 600 MB
#   - Chatwoot Web: 600 MB
#   - Sidekiq: 400 MB
#   - Redis: 256 MB (memória limite do Redis)
#   - Nginx + Cloudflared: ~100 MB (combinado)
#   Total estimado: ~1.95 GB
#
# Requisitos do host Windows:
#   - Docker Desktop com mínimo 2 GB alocado (Settings → Resources → Memory)
#   - Ollama executando em https://ollama.ai (não dentro do Docker)
#   - Gemma3 pré-carregado em Ollama (ollama pull gemma3)
#
# Uso rápido:
#   cp .env.example .env   # preencha os valores
#   ollama pull gemma3     # no prompt do Windows, fora do Docker
#   ollama serve           # inicie o Ollama no Windows
#   bash setup.sh          # em terminal separado, suba os containers
# =============================================================================
# NOTA: Qualquer mudança nos limites de memória abaixo (deploy.resources.limits)
# deve ser testada para garantir que a soma não exceda o disponível no Docker Desktop.
# =============================================================================


# ---------------------------------------------------------------------------
# Volumes nomeados — dados persistentes fora dos contêineres
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:

# ---------------------------------------------------------------------------
# Rede interna isolada para comunicação entre serviços
# ---------------------------------------------------------------------------
networks:
  chatwoot_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Serviços
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # PostgreSQL 14 — banco de dados relacional
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg14
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 600M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis 7 — cache e fila de jobs (Sidekiq)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Chatwoot Web — interface Rails + Puma (porta interna 3000)
  # -------------------------------------------------------------------------
  chatwoot:
    image: chatwoot/chatwoot:latest-ce
    restart: unless-stopped
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    env_file: .env
    environment:
      # Sobrescreve o RAILS_ENV para garantir produção
      RAILS_ENV: production
      NODE_ENV: production
      # Endpoint do Ollama rodando no host Windows (fora do Docker)
      LLM_ENDPOINT: http://host.docker.internal:11434
    volumes:
      - chatwoot_storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 600M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -------------------------------------------------------------------------
  # Chatwoot Worker — Sidekiq para jobs em background
  # ATENÇÃO: Sidekiq apresenta vazamento gradual de memória sob carga intensa.
  # Configure Swap no host e monitore o uso de RAM periodicamente.
  # -------------------------------------------------------------------------
  sidekiq:
    image: chatwoot/chatwoot:latest-ce
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      # Endpoint do Ollama rodando no host Windows (fora do Docker)
      LLM_ENDPOINT: http://host.docker.internal:11434
    volumes:
      - chatwoot_storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 400M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Nginx — proxy reverso
  # underscores_in_headers on; é obrigatório para a autenticação da API
  # do Chatwoot (cabeçalhos como api_access_token).
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "65271:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Monte certificados TLS aqui quando disponíveis:
      - ./certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 50M
    depends_on:
      - chatwoot

  # -------------------------------------------------------------------------
  # Cloudflare Tunnel (cloudflared) — expõe o servidor local via Cloudflare
  # Evita bloqueio da Meta por "URLs maliciosas" (comum com Ngrok gratuito)
  # e garante um domínio confiável para recebimento de webhooks do WhatsApp.
  #
  # Pré-requisito: crie o túnel no painel da Cloudflare e obtenha o token.
  #   https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
  # -------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 50M
    depends_on:
      - nginx