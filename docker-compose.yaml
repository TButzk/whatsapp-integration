# =============================================================================
# docker-compose.yaml — Chatwoot Community Edition
# Plataforma de atendimento via WhatsApp Business (Cloud API da Meta)
#
# Requisitos do host (Ubuntu 22.04 LTS):
#   - Mínimo 2 vCPU / 4 GB RAM
#   - Configure ao menos 1 GB de Swap no SO host para absorver picos do
#     Sidekiq (worker), que apresenta vazamentos graduais de memória sob
#     uso intenso. Exemplo:
#       sudo fallocate -l 1G /swapfile
#       sudo chmod 600 /swapfile
#       sudo mkswap /swapfile
#       sudo swapon /swapfile
#       echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
#
# Uso rápido:
#   cp .env.example .env   # preencha os valores
#   bash setup.sh          # inicializa banco e sobe os serviços
# =============================================================================

# ---------------------------------------------------------------------------
# Volumes nomeados — dados persistentes fora dos contêineres
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:

# ---------------------------------------------------------------------------
# Rede interna isolada para comunicação entre serviços
# ---------------------------------------------------------------------------
networks:
  chatwoot_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Serviços
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # PostgreSQL 14 — banco de dados relacional
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatwoot_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis 7 — cache e fila de jobs (Sidekiq)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - chatwoot_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Chatwoot Web — interface Rails + Puma (porta interna 3000)
  # -------------------------------------------------------------------------
  chatwoot:
    image: chatwoot/chatwoot:latest-ce
    restart: unless-stopped
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    env_file: .env
    environment:
      # Sobrescreve o RAILS_ENV para garantir produção
      RAILS_ENV: production
      NODE_ENV: production
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - chatwoot_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -------------------------------------------------------------------------
  # Chatwoot Worker — Sidekiq para jobs em background
  # ATENÇÃO: Sidekiq apresenta vazamento gradual de memória sob carga intensa.
  # Configure Swap no host e monitore o uso de RAM periodicamente.
  # -------------------------------------------------------------------------
  sidekiq:
    image: chatwoot/chatwoot:latest-ce
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env
    environment:
      RAILS_ENV: production
      NODE_ENV: production
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - chatwoot_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Nginx — proxy reverso
  # underscores_in_headers on; é obrigatório para a autenticação da API
  # do Chatwoot (cabeçalhos como api_access_token).
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Monte certificados TLS aqui quando disponíveis:
      # - ./certs:/etc/nginx/certs:ro
    networks:
      - chatwoot_net
    depends_on:
      - chatwoot

  # -------------------------------------------------------------------------
  # Cloudflare Tunnel (cloudflared) — expõe o servidor local via Cloudflare
  # Evita bloqueio da Meta por "URLs maliciosas" (comum com Ngrok gratuito)
  # e garante um domínio confiável para recebimento de webhooks do WhatsApp.
  #
  # Pré-requisito: crie o túnel no painel da Cloudflare e obtenha o token.
  #   https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
  # -------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - chatwoot_net
    depends_on:
      - nginx
