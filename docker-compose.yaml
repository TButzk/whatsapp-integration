# =============================================================================
# docker-compose.yaml — Chatwoot Community Edition + Ollama Local
# Plataforma de atendimento via WhatsApp Business (Cloud API da Meta)
#
# Configuração para Windows com Docker Desktop + Ollama nativo no host:
#   - Chatwoot rodando em Docker (2 GB máximo)
#   - Ollama rodando nativo no Windows (fora do Docker)
#   - Integração via http://host.docker.internal:11434
#
# Distribuição de memória (máx 2 GB):
#   - PostgreSQL: 600 MB
#   - Chatwoot Web: 600 MB
#   - Sidekiq: 400 MB
#   - Redis: 256 MB (memória limite do Redis)
#   - Nginx + Cloudflared: ~100 MB (combinado)
#   Total estimado: ~1.95 GB
#
# Requisitos do host Windows:
#   - Docker Desktop com mínimo 2 GB alocado (Settings → Resources → Memory)
#   - Ollama executando em https://ollama.ai (não dentro do Docker)
#   - Gemma3 pré-carregado em Ollama (ollama pull gemma3)
#
# Uso rápido:
#   cp .env.example .env   # preencha os valores
#   ollama pull gemma3     # no prompt do Windows, fora do Docker
#   ollama serve           # inicie o Ollama no Windows
#   bash setup.sh          # em terminal separado, suba os containers
# =============================================================================
# NOTA: Qualquer mudança nos limites de memória abaixo (deploy.resources.limits)
# deve ser testada para garantir que a soma não exceda o disponível no Docker Desktop.
# =============================================================================


# ---------------------------------------------------------------------------
# Volumes nomeados — dados persistentes fora dos contêineres
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  chatwoot_storage:
  apptrip_postgres_data:
  apptrip_uploads:

# ---------------------------------------------------------------------------
# Rede interna isolada para comunicação entre serviços
# ---------------------------------------------------------------------------
networks:
  chatwoot_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Serviços
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # PostgreSQL 14 — banco de dados relacional
  # -------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg14
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 600M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis 7 — cache e fila de jobs (Sidekiq)
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Chatwoot Web — interface Rails + Puma (porta interna 3000)
  # -------------------------------------------------------------------------
  chatwoot:
    image: chatwoot/chatwoot:latest-ce
    restart: unless-stopped
    command: sh -lc "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b 0.0.0.0"
    env_file: .env
    environment:
      # Sobrescreve o RAILS_ENV para garantir produção
      RAILS_ENV: production
      NODE_ENV: production
      # Endpoint do Ollama rodando no host Windows (fora do Docker)
      LLM_ENDPOINT: http://host.docker.internal:11434
    volumes:
      - chatwoot_storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 600M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ruby -rsocket -e 'TCPSocket.new(\"127.0.0.1\", 3000).close; exit 0' "]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -------------------------------------------------------------------------
  # Chatwoot Worker — Sidekiq para jobs em background
  # ATENÇÃO: Sidekiq apresenta vazamento gradual de memória sob carga intensa.
  # Configure Swap no host e monitore o uso de RAM periodicamente.
  # -------------------------------------------------------------------------
  sidekiq:
    image: chatwoot/chatwoot:latest-ce
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    env_file: .env
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      # Endpoint do Ollama rodando no host Windows (fora do Docker)
      LLM_ENDPOINT: http://host.docker.internal:11434
    volumes:
      - chatwoot_storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 400M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # AppTrip PostgreSQL 16 — banco novo e isolado para o AppTrip
  # -------------------------------------------------------------------------
  apptrip-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: apptrip
      POSTGRES_USER: apptrip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - apptrip_postgres_data:/var/lib/postgresql/data
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 400M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apptrip -d apptrip"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # AppTrip Backend — Spring Boot API interna (porta 5010)
  # -------------------------------------------------------------------------
  apptrip-backend:
    build:
      context: ../AppTrip/backend-java
    restart: unless-stopped
    environment:
      SERVER_PORT: 5010
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SPRING_DATASOURCE_URL: jdbc:postgresql://apptrip-postgres:5432/apptrip
      SPRING_DATASOURCE_USERNAME: apptrip
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_FORMAT_SQL: "false"
      SECURITY_SECRET_KEY: ${APPTRIP_SECURITY_SECRET_KEY:-bXkgc2VjdXJlIGtleSBmb3IgdHJpcHZlcnNlIGFwcGxpY2F0aW9uIDIwMjU=}
      GEOCODE_API_KEY: ${APPTRIP_GEOCODE_API_KEY:-691f70d4b6f7b354059268umf0f8868}
      APPTRIP_UPLOADS_PATH: /app/uploads
    volumes:
      - apptrip_uploads:/app/uploads
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 700M
    depends_on:
      apptrip-postgres:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # AppTrip React Web — build Vite servido por Nginx interno
  # -------------------------------------------------------------------------
  apptrip-react-web:
    build:
      context: ../AppTrip/frontend-web
      args:
        VITE_API_BASE_URL: /apptrip-api/api/v1
        VITE_BASE_PATH: /apptrip-react/
    restart: unless-stopped
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 50M

  # -------------------------------------------------------------------------
  # AppTrip Flutter Web — build Flutter servido por Nginx interno
  # -------------------------------------------------------------------------
  apptrip-flutter-web:
    build:
      context: ../AppTrip/frontend-flutter
      args:
        API_BASE_URL: /apptrip-api/api/v1
        FLUTTER_BASE_HREF: /apptrip-flutter/
    restart: unless-stopped
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 50M

  # -------------------------------------------------------------------------
  # Nginx — proxy reverso
  # underscores_in_headers on; é obrigatório para a autenticação da API
  # do Chatwoot (cabeçalhos como api_access_token).
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "65271:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Monte certificados TLS aqui quando disponíveis:
      - ./certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 50M
    depends_on:
      - chatwoot
      - apptrip-backend
      - apptrip-react-web
      - apptrip-flutter-web

  # -------------------------------------------------------------------------
  # Cloudflare Tunnel (cloudflared) — expõe o servidor local via Cloudflare
  # Evita bloqueio da Meta por "URLs maliciosas" (comum com Ngrok gratuito)
  # e garante um domínio confiável para recebimento de webhooks do WhatsApp.
  #
  # Pré-requisito: crie o túnel no painel da Cloudflare e obtenha o token.
  #   https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
  # -------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - chatwoot_net
    deploy:
      resources:
        limits:
          memory: 50M
    depends_on:
      - nginx
