# =============================================================================
# nginx.conf - Gateway reverso para Chatwoot, auto-reply e AppTrip
#
# Topologia:
#   Internet -> Cloudflare Tunnel -> Nginx (:80) -> servicos internos
#
# Regra critica: underscores_in_headers on;
# O Chatwoot usa headers com sublinhado, como api_access_token.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    underscores_in_headers on;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json
                       application/javascript text/xml application/xml
                       application/xml+rss text/javascript;

    proxy_read_timeout     300s;
    proxy_connect_timeout   60s;
    proxy_send_timeout     300s;

    client_max_body_size 100M;

    server {
        listen       80;
        server_name  _;

        # Auto-reply: Chatwoot -> Nginx -> bridge no host Windows.
        location /auto-reply/ {
            proxy_pass         http://host.docker.internal:8000/;
            proxy_http_version 1.1;

            proxy_set_header  Host                    $host;
            proxy_set_header  X-Real-IP               $remote_addr;
            proxy_set_header  X-Forwarded-For         $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto       $scheme;
            proxy_set_header  X-Chatwoot-Signature    $http_x_chatwoot_signature;
            proxy_set_header  X-Chatwoot-Timestamp    $http_x_chatwoot_timestamp;
            proxy_set_header  X-Chatwoot-Delivery     $http_x_chatwoot_delivery;
        }

        # AppTrip API: remove /apptrip-api/ antes de encaminhar ao Spring Boot.
        location = /apptrip-api {
            return 301 /apptrip-api/;
        }

        location /apptrip-api/ {
            proxy_pass         http://apptrip-backend:5010/;
            proxy_http_version 1.1;

            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Host   $host;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            proxy_set_header  X-Forwarded-Prefix /apptrip-api;
        }

        # AppTrip React Web.
        location = /apptrip-react {
            return 301 /apptrip-react/;
        }

        location /apptrip-react/ {
            proxy_pass         http://apptrip-react-web/;
            proxy_http_version 1.1;

            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        # AppTrip Flutter Web.
        location = /apptrip-flutter {
            return 301 /apptrip-flutter/;
        }

        location /apptrip-flutter/ {
            proxy_pass         http://apptrip-flutter-web/;
            proxy_http_version 1.1;

            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
        }

        # Chatwoot permanece na raiz do dominio.
        location / {
            proxy_pass         http://chatwoot:3000;

            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header  Upgrade    $http_upgrade;
            proxy_set_header  Connection "upgrade";
        }
    }
}
