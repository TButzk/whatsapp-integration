# =============================================================================
# nginx.conf — Proxy reverso para o Chatwoot Community Edition
#
# REGRA CRÍTICA: underscores_in_headers on;
#   O Chatwoot utiliza cabeçalhos com sublinhado (ex.: api_access_token) para
#   autenticação da API. Sem esta diretiva, o Nginx os descarta silenciosamente
#   e TODAS as integrações falharão com erro 401.
#
# Topologia:
#   Internet → Cloudflare Tunnel → Nginx (:80 / :443) → Chatwoot (:3000)
# =============================================================================

# ---------------------------------------------------------------------------
# Contexto global
# ---------------------------------------------------------------------------
user  nginx;
worker_processes  auto;          # Um worker por núcleo de CPU disponível

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;    # Suficiente para ~10.000 msgs/dia
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------------
    # REGRA CRÍTICA — não remova esta diretiva.
    # O Chatwoot usa cabeçalhos com sublinhado (api_access_token, etc.).
    # -----------------------------------------------------------------------
    underscores_in_headers on;

    # -----------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # -----------------------------------------------------------------------
    # Performance
    # -----------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json
                       application/javascript text/xml application/xml
                       application/xml+rss text/javascript;

    # -----------------------------------------------------------------------
    # Timeouts — aumentados para suportar uploads e webhooks longos
    # -----------------------------------------------------------------------
    proxy_read_timeout    300s;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;

    # -----------------------------------------------------------------------
    # Tamanho máximo do corpo (uploads de mídia do WhatsApp)
    # -----------------------------------------------------------------------
    client_max_body_size 100M;

    # -----------------------------------------------------------------------
    # Virtual host — HTTP (porta 80)
    # Redireciona para HTTPS quando TLS estiver configurado.
    # Para usar apenas HTTP (ex.: atrás do Cloudflare Tunnel), remova o
    # bloco de redirecionamento e descomente o bloco de proxy abaixo.
    # -----------------------------------------------------------------------
    server {
        listen       80;
        server_name  _;

        # --- Opção A: redirecionar para HTTPS (recomendado em produção) ---
        # Descomente quando tiver certificado TLS disponível:
        # return 301 https://$host$request_uri;

        # --- Opção B: proxy direto via HTTP (Cloudflare Tunnel já faz TLS) ---
        location / {
            proxy_pass         http://chatwoot:3000;

            # Repassa os cabeçalhos necessários ao backend
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;

            # Suporte a WebSocket (cable do Chatwoot / Action Cable)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Endpoint de healthcheck interno (não exposto ao público)
        location /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }

    # -----------------------------------------------------------------------
    # Virtual host — HTTPS (porta 443)
    # Descomente e configure quando os certificados TLS estiverem disponíveis.
    # -----------------------------------------------------------------------
    # server {
    #     listen       443 ssl http2;
    #     server_name  <seu-dominio.example.com>;
    #
    #     ssl_certificate      /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key  /etc/nginx/certs/privkey.pem;
    #     ssl_protocols        TLSv1.2 TLSv1.3;
    #     ssl_ciphers          HIGH:!aNULL:!MD5;
    #     ssl_session_cache    shared:SSL:10m;
    #     ssl_session_timeout  10m;
    #
    #     location / {
    #         proxy_pass         http://chatwoot:3000;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade    $http_upgrade;
    #         proxy_set_header   Connection "upgrade";
    #     }
    # }
}
